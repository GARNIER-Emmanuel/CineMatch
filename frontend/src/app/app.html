<cm-navbar (toggleFilters)="toggleFilters()"></cm-navbar>

<main>
  <div class="error-container" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
    <button (click)="loadAllMovies()" class="btn-retry glass">Réessayer</button>
  </div>
  
  <div class="content-container" *ngIf="!errorMessage">
    <div class="filters-wrapper" *ngIf="showFilters">
      <cm-movie-filters 
        (genreChange)="onGenreChange($event)"
        (providerChange)="onProviderChange($event)"
        (durationChange)="onDurationChange($event)"
        (certificationChange)="onCertificationChange($event)">
      </cm-movie-filters>
    </div>

    <!-- CAS A : Aucun filtre actif (Mises en avant) -->
    <div class="highlight-sections" *ngIf="!hasActiveFilters">
      <cm-movie-row title="Populaires sur CineMatch" [movies]="popularMovies" [loading]="loadingPopular"></cm-movie-row>
      <cm-movie-row title="Action & Aventure" [movies]="actionMovies" [loading]="loadingAction"></cm-movie-row>
      <cm-movie-row title="Tendances actuelles" [movies]="trendingMovies" [loading]="loadingTrending"></cm-movie-row>
    </div>

    <!-- CAS B : Filtres actifs (Grille de résultats de recherche) -->
    <div class="search-results-section" *ngIf="hasActiveFilters">
      <cm-movie-row 
        title="Résultats de votre recherche" 
        [movies]="discoveryMovies" 
        [loading]="loadingDiscovery"
        [isGrid]="true">
      </cm-movie-row>
      
      <div class="pagination-footer" *ngIf="hasMoreResults">
        <cm-movie-pagination
          [isLoading]="loadingDiscovery"
          (loadMore)="onLoadMore()">
        </cm-movie-pagination>
      </div>
    </div>
  </div>
</main>

<style>
  main {
    padding-top: 80px; /* Compense la hauteur du header fixe */
  }

  .content-container {
    position: relative;
    z-index: 20;
    padding-bottom: 50px;
  }

  .pagination-footer {
    margin-top: 40px;
    display: flex;
    justify-content: center;
  }

  .search-results-section {
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
