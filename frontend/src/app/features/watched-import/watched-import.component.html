<div class="watched-import-container">
  <!-- MESSAGE DE FEEDBACK -->
  <div class="feedback-toast" *ngIf="feedbackMessage" [class.success]="isSuccess">
    {{ isSuccess ? '✅' : '❌' }} {{ feedbackMessage }}
  </div>

  <!-- ÉTAT 1 : AUCUNE LISTE -->
  <div class="import-actions" *ngIf="watchedService.getCount() === 0">
    <label class="import-label">
      <input type="file" (change)="onFileSelected($event)" accept=".csv" hidden>
      <span class="btn-import">
        <span class="icon">👁</span>
        Importer mes films vus (CSV Letterboxd)
      </span>
    </label>
  </div>

  <!-- ÉTAT 2 : LISTE IMPORTÉE -->
  <div class="status-actions" *ngIf="watchedService.getCount() > 0">
    <span class="count-badge">
      <span class="icon">👁</span>
      {{ watchedService.getCount() }} films importés
    </span>

    <div class="btn-group">
      <button class="btn-refresh" (click)="onRefresh()" title="Rafraîchir les recommandations">
        🔄 Rafraîchir
      </button>

      <label class="reimport-label">
        <input type="file" (change)="onFileSelected($event)" accept=".csv" hidden>
        <span class="btn-secondary">📂 Réimporter</span>
      </label>

      <button class="btn-danger" (click)="onReset()">
        🗑 Supprimer
      </button>
    </div>
  </div>
</div>
